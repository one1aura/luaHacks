<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LuaVault - Roblox Script Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --neon-green: #00ff41;
      --neon-cyan: #00f5ff;
      --neon-purple: #bf00ff;
      --neon-pink: #ff006e;
      --dark-bg: #010409;
      --card-bg: #0d1117;
      --card-border: #1a2332;
      --text-primary: #e6edf3;
      --text-muted: #7d8590;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--dark-bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Matrix Rain Canvas */
    #matrix-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.04;
      pointer-events: none;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.01) 2px, rgba(0,255,65,0.01) 4px);
      z-index: 1;
      pointer-events: none;
    }

    .content-wrapper { position: relative; z-index: 2; }

    /* NAVBAR */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      background: rgba(13,17,23,0.95);
      border-bottom: 1px solid var(--neon-green);
      box-shadow: 0 0 20px rgba(0,255,65,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .nav-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--neon-green);
      text-shadow: 0 0 20px var(--neon-green), 0 0 40px var(--neon-green);
      letter-spacing: 3px;
      cursor: pointer;
    }

    .nav-logo span { color: var(--neon-cyan); }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .nav-links a:hover {
      color: var(--neon-green);
      text-shadow: 0 0 10px var(--neon-green);
      background: rgba(0,255,65,0.05);
    }

    .nav-discord {
      background: linear-gradient(135deg, #5865F2, #7289da);
      color: #fff !important;
      padding: 6px 14px !important;
      border-radius: 6px !important;
      font-weight: bold;
      box-shadow: 0 0 15px rgba(88,101,242,0.4);
      transition: all 0.3s !important;
    }

    .nav-discord:hover {
      box-shadow: 0 0 25px rgba(88,101,242,0.8) !important;
      transform: translateY(-1px);
      color: #fff !important;
    }

    .btn-upload-nav {
      background: transparent;
      border: 1px solid var(--neon-green);
      color: var(--neon-green) !important;
      padding: 6px 16px !important;
      border-radius: 6px !important;
      cursor: pointer;
      transition: all 0.3s !important;
      text-shadow: 0 0 8px var(--neon-green);
    }

    .btn-upload-nav:hover {
      background: var(--neon-green) !important;
      color: #000 !important;
      box-shadow: 0 0 20px var(--neon-green) !important;
      text-shadow: none !important;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 2rem 60px;
      position: relative;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(0,255,65,0.05);
      border: 1px solid rgba(0,255,65,0.3);
      color: var(--neon-green);
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: pulse-border 2s infinite;
    }

    @keyframes pulse-border {
      0%, 100% { border-color: rgba(0,255,65,0.3); box-shadow: 0 0 10px rgba(0,255,65,0.1); }
      50% { border-color: rgba(0,255,65,0.8); box-shadow: 0 0 20px rgba(0,255,65,0.3); }
    }

    .hero h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(0,255,65,0.3));
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 550px;
      margin: 0 auto 2rem;
      line-height: 1.7;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-top: 2rem;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: 0 0 15px var(--neon-cyan);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* SEARCH + FILTER */
    .search-section {
      padding: 0 2rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .search-bar-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-bar-wrap input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      padding: 14px 20px 14px 50px;
      border-radius: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      transition: all 0.3s;
      outline: none;
    }

    .search-bar-wrap input:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 20px rgba(0,255,65,0.15);
    }

    .search-bar-wrap input::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--neon-green);
      font-size: 1.1rem;
    }

    .filters {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-right: 0.5rem;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--neon-green);
      color: var(--neon-green);
      background: rgba(0,255,65,0.06);
      box-shadow: 0 0 12px rgba(0,255,65,0.15);
    }

    .filter-btn.key-filter.active {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      background: rgba(255,0,110,0.06);
      box-shadow: 0 0 12px rgba(255,0,110,0.15);
    }

    .filter-btn.universal-filter.active {
      border-color: var(--neon-purple);
      color: var(--neon-purple);
      background: rgba(191,0,255,0.06);
      box-shadow: 0 0 12px rgba(191,0,255,0.15);
    }

    /* SCRIPTS GRID */
    .scripts-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      color: var(--neon-green);
      text-shadow: 0 0 10px var(--neon-green);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .section-title::before { content: '> '; }

    .scripts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .script-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
    }

    .script-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .script-card:hover {
      border-color: rgba(0,255,65,0.4);
      box-shadow: 0 0 30px rgba(0,255,65,0.1), 0 8px 30px rgba(0,0,0,0.5);
      transform: translateY(-3px);
    }

    .script-card:hover::before { opacity: 1; }

    .card-image {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      filter: brightness(0.8) saturate(1.2);
    }

    .card-image-placeholder {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #0d1117, #1a2332);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 2rem;
    }

    .card-body { padding: 1rem; }

    .card-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .tag {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: bold;
    }

    .tag-keyless {
      background: rgba(0,255,65,0.1);
      border: 1px solid rgba(0,255,65,0.4);
      color: var(--neon-green);
    }

    .tag-key {
      background: rgba(255,0,110,0.1);
      border: 1px solid rgba(255,0,110,0.4);
      color: var(--neon-pink);
    }

    .tag-universal {
      background: rgba(191,0,255,0.1);
      border: 1px solid rgba(191,0,255,0.4);
      color: var(--neon-purple);
    }

    .tag-category {
      background: rgba(0,245,255,0.08);
      border: 1px solid rgba(0,245,255,0.3);
      color: var(--neon-cyan);
    }

    .card-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-game {
      font-size: 0.75rem;
      color: var(--neon-cyan);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.75rem;
      border-top: 1px solid var(--card-border);
    }

    .card-author {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .card-author span { color: var(--neon-green); }

    .card-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-copy {
      background: rgba(0,255,65,0.08);
      border: 1px solid rgba(0,255,65,0.3);
      color: var(--neon-green);
      padding: 5px 12px;
      border-radius: 5px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }

    .btn-copy:hover {
      background: var(--neon-green);
      color: #000;
      box-shadow: 0 0 15px var(--neon-green);
    }

    /* MODAL - Upload */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--neon-green);
      border-radius: 12px;
      width: 90%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 60px rgba(0,255,65,0.2);
      position: relative;
    }

    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-track { background: var(--dark-bg); }
    .modal::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 2px; }

    .modal-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      color: var(--neon-green);
      text-shadow: 0 0 10px var(--neon-green);
      letter-spacing: 2px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.3rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .modal-close:hover { color: var(--neon-pink); }

    .modal-body { padding: 1.5rem; }

    .form-group { margin-bottom: 1.2rem; }

    .form-label {
      display: block;
      font-size: 0.78rem;
      color: var(--neon-cyan);
      letter-spacing: 1px;
      text-transform: uppercase;
